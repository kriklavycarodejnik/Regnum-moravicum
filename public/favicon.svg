<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC143C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00008B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#blueGradient)" stroke="#000" stroke-width="1"/>
  
  <!-- Shield shape (representing Moravia) -->
  <path d="M50,15 C65,15 75,25 75,40 C75,55 65,65 50,65 C35,65 25,55 25,40 C25,25 35,15 50,15 Z" 
        fill="url(#redGradient)" stroke="#000" stroke-width="1"/>
  
  <!-- Cross (representing Christianity) -->
  <rect x="45" y="25" width="10" height="30" fill="url(#goldGradient)" stroke="#000" stroke-width="0.5"/>
  <rect x="35" y="45" width="30" height="10" fill="url(#goldGradient)" stroke="#000" stroke-width="0.5"/>
  
  <!-- Crown (representing royalty) -->
  <path d="M35,20 L38,15 L42,18 L45,12 L48,18 L52,15 L55,20 L52,23 L48,26 L45,23 L42,26 L38,23 Z" 
        fill="url(#goldGradient)" stroke="#000" stroke-width="0.5"/>
  
  <!-- Text abbreviation -->
  <text x="50" y="85" font-family="Arial, sans-serif" font-size="8" 
        font-weight="bold" fill="#FFD700" text-anchor="middle">RM</text>
</svg>
